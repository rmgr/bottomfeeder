{% extends "layout.html" %}
{% block content %}
    <h1>Add a Feed</h1>

    <form action="/add-feed" method="post">
      <label>Feed Name: <input type="text" name="feed_name"></label><br>
      <label>Feed Url: <input type="text" name="feed_url"></label><br>
      <label>Age Window: <input type="text" name="age_window" value="168"></label><br>
	<label>Crawl Page Content: <input type="checkbox" name="crawl_page_content" </label><br>
	<label>Link Filter: <input type="text" name="link_filter"></label><br>
	<label>Page Filter: <input type="text" name="page_filter"></label><br>
      <button type="submit">Save</button>
    </form>
{% endblock %}

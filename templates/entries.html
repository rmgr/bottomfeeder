<html>
<head>
    <link href="{{ url_for('static', path='/styles.css') }}" rel="stylesheet">
</head>
<body>
    <h1>Entries</h1>

    {% for entry in entries.items %}
        <article>
            <h2><a href="{{ entry.link }}">{{ entry.title }}</a></h2>
            <p>{{ entry.summary }}</p>
        </article>
    {% endfor %}

    <div class="pagination">
        {% if entries.page > 1 %}
            <a href="/feed/{{ feed_id }}?page={{ entries.page - 1 }}&page_size={{ entries.page_size }}">Previous</a>
        {% endif %}

        <span>Page {{ entries.page }}</span>

        {% if entries.page < entries.total_pages %}
            <a href="/feed/{{ feed_id }}?page={{ entries.page + 1 }}&page_size={{ entries.page_size }}">Next</a>
        {% endif %}
    </div>
</body>
</html>

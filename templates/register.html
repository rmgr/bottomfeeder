{% extends "layout.html" %}
{% block content %}
<h2>Register</h2>
<form action="/register" method="post">
  <label>Account Name:
    <input type="text" name="account_name" required>
  </label><br>

  <label>Email Address:
    <input type="email" name="email_address" required>
  </label><br>

  <label>Password:
    <input type="password" name="password" required>
  </label><br>

  <button type="submit">Register</button>
  <a href="/">Login</a>
</form>
{% endblock %}

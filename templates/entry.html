{% extends "layout.html" %}
{% block content %}
  <style>
    #mark-read {
    display:none;
  }
  </style>
  <a href="{{ entry.link }}"><h1>{{ entry.title }}</h1></a>
<div>
  <a id="mark-unread" href="#">Mark Unread</a>
  <a id="mark-read" href="#">Mark Read</a>
</div>
{{ entry.description|safe }}
<script>
function show_mark_unread() {

  document.querySelector("#mark-unread").style.display = "block";
  document.querySelector("#mark-read").style.display = "none";
}
function show_mark_read() {

  document.querySelector("#mark-read").style.display = "block";
  document.querySelector("#mark-unread").style.display = "none";
}

document.querySelector("#mark-read").addEventListener("click", (event) => {
  fetch(
    new Request("/v1/entries/{{entry.id}}/read")
  ).then(
      (response) =>
        {
          show_mark_unread();
        }
    );
  });

document.querySelector("#mark-unread").addEventListener("click", (event) => {
  fetch(
    new Request("/v1/entries/{{entry.id}}/unread")
  ).then(
      (response) =>
        {
          show_mark_read();
        }
    );
  });
</script>
{% endblock %}
